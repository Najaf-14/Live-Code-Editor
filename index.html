<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="heading">
        <h1>Live Code Editor</h1>
    </header>
    <hr>
    <main class="container">
        <div class="top">
            <div class="html-part">
                <label >HTML</label>
                <textarea></textarea>
            </div>
            <div class="css-part">
                <label >CSS</label>
                <textarea></textarea>
            </div>
            <div class="js-part">
                <label >JS</label>
                <textarea></textarea>
            </div>
        </div>
        <div class="bottom">
            <label>Output</label>
            <iframe id="output"></iframe>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
